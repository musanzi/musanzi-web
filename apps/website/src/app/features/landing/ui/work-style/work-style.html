<section id="work-style" class="mb-14 scroll-mt-8 md:mb-22">
  <div class="mb-3 flex items-center gap-2.5">
    <p
      class="inline-flex items-center gap-1.5 text-sm leading-4 font-semibold tracking-wide whitespace-nowrap text-neutral-500">
      <mat-icon class="size-4 text-primary-600" svgIcon="list-checks" />
      Work Style
    </p>
    <div class="h-px w-full bg-neutral-300"></div>
  </div>
  <h2 class="mb-6 max-w-[18ch] text-2xl leading-tight font-bold text-neutral-900">How I approach delivery.</h2>
  <ol class="grid max-w-2xl">
    @for (principle of workPrinciples; track principle) {
      <li
        class="relative grid grid-cols-[1.75rem_1fr] gap-1.5 pb-5 after:absolute after:top-7 after:bottom-0 after:left-3.5 after:w-px after:bg-neutral-200 last:after:hidden">
        <span
          class="relative z-10 flex size-6 items-center justify-center rounded-full border border-primary-100 bg-primary-50 text-[0.7rem] font-bold tabular-nums text-primary-700">
          {{ $index + 1 }}
        </span>
        <p class="text-neutral-600">{{ principle }}</p>
      </li>
    }
  </ol>
</section>
