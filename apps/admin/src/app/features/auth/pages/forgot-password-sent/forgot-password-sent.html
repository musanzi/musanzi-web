<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">
    <div class="mb-6 flex flex-col items-center gap-1 text-center">
      <h2 class="flex items-center gap-1.5 text-2xl font-bold tracking-tight text-neutral-900">
        <mat-icon class="size-6 text-green-700" svgIcon="check"></mat-icon>
        Link sent
      </h2>
      <p class="text-sm text-neutral-500">
        If this email address is associated with an account, a reset link has been sent. The link expires in 15 minutes.
      </p>
    </div>

    <div
      class="rounded-2xl border border-gray-200/70 bg-white p-8 shadow-[0_1px_2px_rgba(0,0,0,0.04),0_16px_32px_-16px_rgba(0,0,0,0.12)]">
      <div class="flex flex-col items-center gap-6">
        <p class="text-sm text-neutral-500">
          Already reset your password?
          <a class="font-medium text-primary-600 underline-offset-4 hover:underline" routerLink="/auth/sign-in">
            Sign in
          </a>
        </p>

        <a
          class="inline-flex items-center gap-1 text-sm font-medium text-primary-600 underline-offset-4 hover:underline"
          routerLink="/auth/sign-in">
          <mat-icon class="size-4" svgIcon="arrow-left"></mat-icon>
          <span>Back to sign in</span>
        </a>
      </div>
    </div>
  </div>
</div>
